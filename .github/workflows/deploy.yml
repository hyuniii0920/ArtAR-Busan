name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: artar
          POSTGRES_PASSWORD: artar
          POSTGRES_DB: artar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://artar:artar@localhost:5432/artar_test
      JWT_SECRET: test-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: "$2b$12$LJ3m4ks5QFtQz1ANHGOJa.GsFBGFN7NlHqmJB2g6Gv8CxTdLRjBHO"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Run tests
        run: pytest -v

