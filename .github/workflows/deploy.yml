name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: artar
          POSTGRES_PASSWORD: artar
          POSTGRES_DB: artar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # 모든 값은 CI 테스트 전용 더미 (prod는 Secret Manager에서 주입)
      DATABASE_URL: postgresql+asyncpg://artar:artar@localhost:5432/artar_test
      JWT_SECRET: test-secret
      ADMIN_USERNAME: admin
      # 평문 'test-only-not-real' 의 bcrypt 해시 (prod와 무관)
      ADMIN_PASSWORD_HASH: "$2b$12$/YSPx/aauoZwyFxqBKSbG.TrHAHu1A3j9fhwJ7a0zE7lRn4j6Jt5u"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Run tests
        run: pytest -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: artar-backend
          source: backend/
          region: asia-northeast3
          env_vars: |
            ENV=production
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            ADMIN_USERNAME=ADMIN_USERNAME:latest
            ADMIN_PASSWORD_HASH=ADMIN_PASSWORD_HASH:latest
            GCS_BUCKET=GCS_BUCKET:latest
          flags: |
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION }}
            --memory=512Mi
            --min-instances=0
            --max-instances=2
            --port=8080
            --allow-unauthenticated
