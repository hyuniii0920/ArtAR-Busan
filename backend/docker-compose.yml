services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: artar
      POSTGRES_PASSWORD: artar
      POSTGRES_DB: artar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://artar:artar@db:5432/artar
      ENV: development
      DEBUG: "true"
      JWT_SECRET: dev-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: "$$2b$$12$$LJ3m4ks5QFtQz1ANHGOJa.GsFBGFN7NlHqmJB2g6Gv8CxTdLRjBHO"
      GCS_BUCKET: artar-busan-assets
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      - db
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080"

volumes:
  pgdata:
